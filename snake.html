<!DOCTYPE html>
<html>
<head>
<title>Ultimate Snake</title>

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    color: white;
    background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
    background-size: cover;
    background-position: center;
}

canvas {
    background: white;
    border: 4px solid white;
    box-shadow: 0 0 25px lime;
}

.overlay {
    position: absolute;
    font-size: 25px;
    color: red;
    display: none;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
}

button {
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🐍 Ultimate Snake</h1>

<p>
Score: <span id="score">0</span> |
High Score: <span id="highScore">0</span> |
Level: <span id="level">1</span>
</p>

<p>WASD / Arrows • SPACE Pause • R Restart</p>

<button id="devBtn" onclick="toggleDev()" 
style="position:absolute; top:10px; right:10px;">
🛠️ Dev Mode: OFF
</button>

<div style="position:relative; display:inline-block;">
<canvas id="gameCanvas" width="800" height="500"></canvas>

<div id="warningText" class="overlay">⚠️ TRAPS INCOMING ⚠️</div>
<div id="laserWarning" class="overlay">⚠️ LASERS ⚠️</div>

<div id="gameOverText" class="overlay" style="top:50%; font-size:40px;">💀 GAME OVER</div>
<div id="pauseText" class="overlay" style="top:50%; font-size:40px;">⏸️ PAUSED</div>
<div id="startText" class="overlay" style="top:50%; font-size:40px;">Press Any Key</div>
</div>

<br>

<button onclick="restartGame()">🔄 Restart</button>
<button onclick="goBack()">⬅ Back to Menu</button>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let snake, food, dx, dy, score, gameRunning, paused;
let speed = 100, loop;
let level = 1;

let traps = [];
let lasers = [];
let devMode = false;

let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

let directionChanged = false;

function toggleDev(){
    devMode = !devMode;
    document.getElementById("devBtn").innerText =
        "🛠️ Dev Mode: " + (devMode ? "ON" : "OFF");
}

function init() {
    snake = [{ x: 400, y: 250 }];
    food = spawnFood();
    traps = [];
    lasers = [];

    dx = 0; dy = 0;
    score = 0;
    level = 1;
    speed = 100;
    gameRunning = false;
    paused = false;

    updateUI();
    showOverlay("startText");
}

function updateUI() {
    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
}

function spawnFood() {
    return {
        x: Math.floor(Math.random()*80)*10,
        y: Math.floor(Math.random()*50)*10
    };
}

function showOverlay(id) {
    ["warningText","laserWarning","gameOverText","pauseText","startText"].forEach(i=>{
        document.getElementById(i).style.display="none";
    });
    if(id) document.getElementById(id).style.display="block";
}

// 💣 TRAPS
function triggerTraps(){
    showOverlay("warningText");

    setTimeout(()=>{
        showOverlay(null);
        spawnTraps();
    },2000);
}

function spawnTraps(){
    traps = [];

    for(let i=0;i<7;i++){
        traps.push({
            x: Math.floor(Math.random()*80)*10,
            y: Math.floor(Math.random()*50)*10
        });
    }

    setTimeout(()=>{ traps=[]; },10000);

    setTimeout(()=>{
        if(score>=10) triggerTraps();
    },15000);
}

// 🔫 LASERS
function triggerLasers(){
    showOverlay("laserWarning");

    setTimeout(()=>{
        showOverlay(null);
        spawnLasers();
    },2000);
}

function spawnLasers(){
    lasers = [];

    for(let i=0;i<4;i++){
        let type = Math.floor(Math.random()*2);

        if(type===0){
            let y = Math.floor(Math.random()*50)*10;
            lasers.push({type:"horizontal", y, active:false});
        } else {
            let x = Math.floor(Math.random()*80)*10;
            lasers.push({type:"vertical", x, active:false});
        }
    }

    window.laserWarningActive = true;

    setTimeout(()=>{
        lasers.forEach(l => l.active = true);
        window.laserWarningActive = false;
    },2000);

    setTimeout(()=>{ lasers=[]; },10000);

    setTimeout(()=>{
        if(score>=20) triggerLasers();
    },20000);
}

init();

document.addEventListener("keydown", e => {

    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)){
        e.preventDefault();
    }

    if(e.key.toLowerCase()==="r"){ restartGame(); return; }

    if(e.code==="Space"){
        if(!gameRunning) return;
        paused=!paused;
        showOverlay(paused?"pauseText":null);
        return;
    }

    if(!gameRunning){
        gameRunning=true;
        showOverlay(null);
    }

    if(directionChanged) return;

    if((e.key==="ArrowUp"||e.key==="w") && dy===0){ dx=0; dy=-10; directionChanged=true; }
    if((e.key==="ArrowDown"||e.key==="s") && dy===0){ dx=0; dy=10; directionChanged=true; }
    if((e.key==="ArrowLeft"||e.key==="a") && dx===0){ dx=-10; dy=0; directionChanged=true; }
    if((e.key==="ArrowRight"||e.key==="d") && dx===0){ dx=10; dy=0; directionChanged=true; }
});

function update(){
    if(!gameRunning||paused) return;

    let head = {x: snake[0].x+dx, y: snake[0].y+dy};

    if(head.x < 0) head.x = 790;
    if(head.x >= 800) head.x = 0;
    if(head.y < 0) head.y = 490;
    if(head.y >= 500) head.y = 0;

    for(let t of traps){
        if(!devMode && head.x===t.x && head.y===t.y) return gameOver(head);
    }

    for(let l of lasers){
        if(!devMode && l.active && l.type==="horizontal" && head.y===l.y) return gameOver(head);
        if(!devMode && l.active && l.type==="vertical" && head.x===l.x) return gameOver(head);
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        level=Math.floor(score/5)+1;

        // 🏆 FIXED HIGH SCORE (LIVE UPDATE)
        if(score > highScore){
            highScore = score;
            localStorage.setItem("highScore", highScore);
            document.getElementById("highScore").innerText = highScore;
        }

        if(score===10) triggerTraps();
        if(score===20) triggerLasers();

        speed=Math.max(40,100-score*2);
        clearInterval(loop);
        loop=setInterval(gameLoop,speed);

        food=spawnFood();
        updateUI();
    } else {
        snake.pop();
    }

    directionChanged=false;
}

function draw(){
    ctx.clearRect(0,0,800,500);

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,10,10);

    ctx.fillStyle="black";
    traps.forEach(t=>ctx.fillRect(t.x,t.y,10,10));

    lasers.forEach(l=>{
        if(window.laserWarningActive && !l.active){
            ctx.fillStyle="rgba(255,0,0,0.3)";
        } else {
            ctx.fillStyle="red";
        }

        if(l.type==="horizontal"){
            ctx.fillRect(0,l.y,800,5);
        } else {
            ctx.fillRect(l.x,0,5,500);
        }
    });

    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x,s.y,10,10));
}

function gameLoop(){
    update();
    draw();
}

loop=setInterval(gameLoop,speed);

function gameOver(head){
    gameRunning=false;
    showOverlay("gameOverText");

    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(head.x,head.y,20,0,Math.PI*2);
    ctx.fill();

    // still keeps your original save on death too
    if(score>highScore){
        highScore=score;
        localStorage.setItem("highScore",highScore);
        document.getElementById("highScore").innerText=highScore;
    }

    setTimeout(init,1500);
}

function restartGame(){ init(); }
function goBack(){ window.location.href="index.html"; }
</script>

</body>
</html>
