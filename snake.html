<!DOCTYPE html>
<html>
<head>
<title>Ultimate Snake</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    color: white;
    background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
    background-size: cover;
}

canvas {
    background: white;
    border: 4px solid white;
    box-shadow: 0 0 25px lime;
    max-width: 95%;
}

/* 📱 MOBILE CONTROLS */
#mobileControls {
    margin-top: 10px;
}

#mobileControls button {
    font-size: 25px;
    padding: 15px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: rgba(0,0,0,0.6);
    color: white;
}

/* hide on computer */
@media (min-width: 768px) {
    #mobileControls {
        display: none;
    }
}
</style>
</head>

<body>

<h1>🐍 Ultimate Snake</h1>

<p>Score: <span id="score">0</span></p>

<canvas id="gameCanvas"></canvas>

<!-- 📱 MOBILE BUTTONS -->
<div id="mobileControls">
    <button onclick="setDirection('up')">⬆️</button>
    <div>
        <button onclick="setDirection('left')">⬅️</button>
        <button onclick="setDirection('down')">⬇️</button>
        <button onclick="setDirection('right')">➡️</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 📱 RESPONSIVE CANVAS
function resizeCanvas(){
    canvas.width = window.innerWidth * 0.95;
    canvas.height = window.innerHeight * 0.6;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

// GAME
let snake = [{x:200,y:200}];
let dx = 10, dy = 0;
let food = {x:100,y:100};
let score = 0;

// 🎮 KEYBOARD CONTROLS
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp" && dy===0){dx=0;dy=-10;}
    if(e.key==="ArrowDown" && dy===0){dx=0;dy=10;}
    if(e.key==="ArrowLeft" && dx===0){dx=-10;dy=0;}
    if(e.key==="ArrowRight" && dx===0){dx=10;dy=0;}
});

// 📱 MOBILE CONTROLS
function setDirection(dir){
    if(dir==="up" && dy===0){dx=0;dy=-10;}
    if(dir==="down" && dy===0){dx=0;dy=10;}
    if(dir==="left" && dx===0){dx=-10;dy=0;}
    if(dir==="right" && dx===0){dx=10;dy=0;}
}

// UPDATE
function update(){
    let head = {x:snake[0].x+dx,y:snake[0].y+dy};

    // 🌀 WALL WRAP
    if(head.x<0) head.x = canvas.width-10;
    if(head.x>=canvas.width) head.x = 0;
    if(head.y<0) head.y = canvas.height-10;
    if(head.y>=canvas.height) head.y = 0;

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        score++;
        document.getElementById("score").innerText = score;

        food = {
            x: Math.floor(Math.random()*(canvas.width/10))*10,
            y: Math.floor(Math.random()*(canvas.height/10))*10
        };
    } else {
        snake.pop();
    }
}

// DRAW
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,10,10);

    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x,s.y,10,10));
}

// LOOP
setInterval(()=>{
    update();
    draw();
},100);
</script>

</body>
</html>
