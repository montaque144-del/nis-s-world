<!DOCTYPE html>
<html>
<head>
<title>Ultimate Snake</title>

<style>
body {
    margin: 0;
    text-align: center;
    font-family: Arial;
    color: white;
    background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
    background-size: cover;
}

canvas {
    background: white;
    border: 4px solid white;
    box-shadow: 0 0 25px lime;
}

.overlay {
    position: absolute;
    font-size: 25px;
    color: red;
    display: none;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
}

button {
    padding: 8px 12px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🐍 Ultimate Snake</h1>

<p>
Score: <span id="score">0</span> |
High Score: <span id="highScore">0</span>
</p>

<button id="devBtn" onclick="toggleDev()" style="position:absolute; top:10px; right:10px;">🛠️ Dev Mode: OFF</button>
<button id="musicBtn" onclick="toggleMusic()" style="position:absolute; top:50px; right:10px;">🎵 Music: ON</button>
<button id="sfxBtn" onclick="toggleSFX()" style="position:absolute; top:90px; right:10px;">🔊 SFX: ON</button>

<div style="position:relative; display:inline-block;">
<canvas id="gameCanvas" width="800" height="500"></canvas>

<div id="warningText" class="overlay">⚠️ WARNING ⚠️</div>
<div id="gameOverText" class="overlay" style="top:50%; font-size:40px;">💀 GAME OVER</div>
</div>

<audio id="eatSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.wav"></audio>
<audio id="deathSound" src="https://assets.mixkit.co/sfx/preview/mixkit-player-losing-or-failing-2042.wav"></audio>
<audio id="bgMusic" src="https://assets.mixkit.co/music/preview/mixkit-serene-view-443.mp3" loop></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const eatSound = document.getElementById("eatSound");
const deathSound = document.getElementById("deathSound");
const bgMusic = document.getElementById("bgMusic");

bgMusic.volume = 0.3;

let audioUnlocked = false;
let devMode = false;
let musicOn = true;
let sfxOn = true;

let snake = [{x:400,y:250}];
let dx = 0, dy = 0;
let food = {x:200,y:200};
let score = 0;

function unlockAudio(){
    if(audioUnlocked) return;

    eatSound.play().catch(()=>{});
    eatSound.pause();
    eatSound.currentTime = 0;

    bgMusic.play().catch(()=>{});
    bgMusic.pause();
    bgMusic.currentTime = 0;

    audioUnlocked = true;
}

document.addEventListener("keydown", e=>{
    unlockAudio();

    if(!musicOn) bgMusic.pause();
    else bgMusic.play().catch(()=>{});

    if(e.key==="ArrowUp") {dx=0;dy=-10;}
    if(e.key==="ArrowDown") {dx=0;dy=10;}
    if(e.key==="ArrowLeft") {dx=-10;dy=0;}
    if(e.key==="ArrowRight") {dx=10;dy=0;}
});

function toggleDev(){
    devMode = !devMode;
    document.getElementById("devBtn").innerText =
        "🛠️ Dev Mode: " + (devMode?"ON":"OFF");
}

function toggleMusic(){
    musicOn = !musicOn;
    let btn = document.getElementById("musicBtn");

    if(musicOn){
        bgMusic.play().catch(()=>{});
        btn.innerText = "🎵 Music: ON";
    } else {
        bgMusic.pause();
        btn.innerText = "🎵 Music: OFF";
    }
}

function toggleSFX(){
    sfxOn = !sfxOn;
    document.getElementById("sfxBtn").innerText =
        "🔊 SFX: " + (sfxOn?"ON":"OFF");
}

function update(){
    let head = {x:snake[0].x+dx,y:snake[0].y+dy};

    // wrap
    if(head.x<0) head.x=790;
    if(head.x>=800) head.x=0;
    if(head.y<0) head.y=490;
    if(head.y>=500) head.y=0;

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){
        if(sfxOn){
            eatSound.currentTime=0;
            eatSound.play().catch(()=>{});
        }
        score++;
        food = {
            x:Math.floor(Math.random()*80)*10,
            y:Math.floor(Math.random()*50)*10
        };
        document.getElementById("score").innerText = score;
    } else {
        snake.pop();
    }
}

function draw(){
    ctx.clearRect(0,0,800,500);

    ctx.fillStyle="red";
    ctx.fillRect(food.x,food.y,10,10);

    ctx.fillStyle="lime";
    snake.forEach(s=>ctx.fillRect(s.x,s.y,10,10));
}

setInterval(()=>{
    update();
    draw();
},100);
</script>

</body>
</html>
