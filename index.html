<!DOCTYPE html>
<html>
<head>
<title>My Game Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;

    background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.overlay {
    background: rgba(0,0,0,0.65);
    min-height: 100vh;
    padding: 40px;
    text-align: center;
}

h1 {
    font-size: 50px;
    margin-bottom: 30px;
}

.games {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    width: 200px;
    height: 200px;
    background: rgba(255,255,255,0.1);
    border: 2px solid white;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: 0.3s;
    backdrop-filter: blur(5px);
}

.card:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 15px white;
}

.coming {
    opacity: 0.6;
    cursor: not-allowed;
}
</style>

</head>

<body>

<div class="overlay">

<h1>🎮 My Game Hub</h1>

<div class="games">

    <!-- Snake Game -->
    <div class="card" onclick="playSnake()">
        🐍 Snake Game
    </div>

    <!-- Coming Soon -->
    <div class="card coming">🚧 Coming Soon</div>
    <div class="card coming">🚧 Coming Soon</div>
    <div class="card coming">🚧 Coming Soon</div>
    <div class="card coming">🚧 Coming Soon</div>

</div>

</div>

<script>
function playSnake() {
    window.location.href = "snake.html";
}
</script>

</body>
</html>
